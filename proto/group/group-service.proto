syntax = "proto3";

package group;

option go_package = "github.com/your-org/group-service/proto;grouppb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service GroupService {
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty);
  rpc UpdateGroup(UpdateGroupRequest) returns (Group);

  rpc AddMember(AddMemberRequest) returns (google.protobuf.Empty);
  rpc RemoveMember(RemoveMemberRequest) returns (google.protobuf.Empty);
  rpc ChangeMemberRole(ChangeMemberRoleRequest) returns (google.protobuf.Empty);

  rpc GetGroup(GetGroupRequest) returns (Group);
  rpc GetGroupMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);
  rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse);

  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);
}

message Group {
  string id = 1;
  string name = 2;
  string owner_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;
  GROUP_ROLE_OWNER = 1;
  GROUP_ROLE_ADMIN = 2;
  GROUP_ROLE_MEMBER = 3;
}

message GroupMember {
  string group_id = 1;
  string user_id = 2;
  GroupRole role = 3;
  google.protobuf.Timestamp joined_at = 4;
}

message CreateGroupRequest {
  string name = 1;
  string creator_id = 2;
}

message CreateGroupResponse {
  Group group = 1;
}

message DeleteGroupRequest {
  string group_id = 1;
  string requester_id = 2;
}

message UpdateGroupRequest {
  string group_id = 1;
  string requester_id = 2;
  string new_name = 3;
}

message AddMemberRequest {
  string group_id = 1;
  string requester_id = 2;
  string user_id = 3;
}

message RemoveMemberRequest {
  string group_id = 1;
  string requester_id = 2;
  string user_id = 3;
}

message ChangeMemberRoleRequest {
  string group_id = 1;
  string requester_id = 2;
  string user_id = 3;
  GroupRole new_role = 4;
}

message GetGroupRequest {
  string group_id = 1;
}

message GetGroupMembersRequest {
  string group_id = 1;
}

message GetGroupMembersResponse {
  repeated GroupMember members = 1;
}

message GetUserGroupsRequest {
  string user_id = 1;
}

message GetUserGroupsResponse {
  repeated Group groups = 1;
}

message IsMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  GroupRole role = 2; 
}